#include /etc/nginx/mime.types;

upstream backend {
  server ${NGINX_BACKEND_HOST}; # set via NGINX_BACKEND_HOST env var (envsubst at container start)
  #server backend.giveandtake.svc.cluster.local:8090; # k3s: full FQDN with namespace
  #server backend:8090; # docker-compose container host
  #server 127.0.0.1:8090;
  #server localhost:8090;
  #server host.docker.internal:8090; # docker internal host # error on azure app service
}

server {
  listen 80;
  listen 8091;
  #listen 443 ssl;
  #root /usr/share/nginx/html;
  #server_name mywebsite.com;
  client_max_body_size 10m; # limit upload file size 10M
  #ssl_certificate /etc/ssl/certs/nginx-selfsigned.crt;
  #ssl_certificate_key /etc/ssl/private/nginx-selfsigned.key;

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri $uri/ /index.html; # fallback to index.html for Vue Router (SPA)
  }

  location /api/ {
    proxy_pass http://backend; # no trailing slash: preserves /api/ prefix for FastAPI
    proxy_http_version 1.1;
    proxy_set_header Connection "";
	
	proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /docs/ {
    proxy_pass http://backend/api/docs/; # backend exposes Swagger UI at /api/docs/
    proxy_http_version 1.1;
    proxy_set_header Connection "";
	
	proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Proto https;
  }

  location /media/ {
    proxy_pass http://backend/media/; # backend serves uploaded media files at /media/
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  ### not use, instead use docker volumes to share static files
  # location /images {
  #   proxy_pass http://backend;
  #   proxy_http_version 1.1;
  #   proxy_set_header Connection "";
  #   # types {
  #   #   image/gif gif;
  #   #   image/jpeg jpeg jpg;
  #   #   image/png png;
  #   # }
  # }

  error_page 500 502 503 504 /50x.html;
  location = /50x.html {
    root /usr/share/nginx/html;
  }
}