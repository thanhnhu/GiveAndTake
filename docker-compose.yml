#version: "3.7"
### For docker running both backend/frontend and dev/prod env
# docker-compose -f docker-compose.yml watch 
# docker-compose -f docker-compose.yml up --build
# docker-compose -f docker-compose.prod.yml up --build

# Docker Compose will automatically load .env file from the same directory
# Create .env file with your credentials (copy from .env.example)

networks:
  giveandtake:
    driver: bridge

volumes:
  pgdata:
  frontend_node_modules:

services:

  postgres:
    image: postgres:17
    restart: always
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-giveandtake}
      POSTGRES_USER: ${DB_USER:-giveandtake}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-giveandtake}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - giveandtake

  backend:
    build:
      context: ./backend
      target: development
    container_name: backend
    restart: always
    volumes:
      # mount source folder on dist to hot reloading
      - ./backend:/app
      # mount credentials file (optional - prefer environment variables)
      - ./backend/credentials.json:/app/credentials.json:ro
      # persist uploaded media files
      - ./backend/media:/app/media
    environment:
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-giveandtake}
      - DB_USER=${DB_USER:-giveandtake}
      - DB_PASSWORD=${DB_PASSWORD:-giveandtake}
      - STORAGE_TYPE=${STORAGE_TYPE:-cloudinary}
      - CLOUDINARY_CLOUD_NAME=${CLOUDINARY_CLOUD_NAME}
      - CLOUDINARY_API_KEY=${CLOUDINARY_API_KEY}
      - CLOUDINARY_API_SECRET=${CLOUDINARY_API_SECRET}
    ports:
      - 8090:8090
    networks:
      - giveandtake

  frontend:
    build:
      context: ./frontend
      target: development
    container_name: frontend
    restart: always
    depends_on:
      - backend
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8090
      - CHOKIDAR_USEPOLLING=true
    volumes:
      # mount source folder on dist to hot reloading
      - ./frontend:/app
      # mount below to reduce image size
      - frontend_node_modules:/app/node_modules
    # environment:
    #   # enables the hot reloading
    #   - CHOKIDAR_USEPOLLING=true
    ports:
      - 8091:8091
    develop:
      # use docker watch instead of hot reloading
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
        - action: rebuild
          path: ./frontend/package.json
          target: /app/package.json
        - action: sync+restart
          path: ./frontend/vite.config.mjs
          target: /app/vite.config.mjs
    networks:
      - giveandtake
